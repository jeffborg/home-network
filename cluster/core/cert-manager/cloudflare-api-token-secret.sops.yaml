apiVersion: v1
kind: Secret
metadata:
    name: cloudflare-api-token
    namespace: cert-manager
type: Opaque
stringData:
    # Cloudflare API token with Zone:DNS:Edit permissions.
    # Same token as used in external-dns-cloudflare-secret but must be in cert-manager namespace.
    # After filling in the real value, encrypt this file with:
    #   sops -e -i cluster/core/cert-manager/cloudflare-api-token-secret.sops.yaml
    api-token: REPLACE_ME

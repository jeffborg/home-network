apiVersion: v1
kind: Secret
metadata:
    name: external-dns-cloudflare-secret
    namespace: network-system
type: Opaque
stringData:
    # Cloudflare API token with Zone:DNS:Edit permissions for ${BASE_DOMAIN}.
    # After filling in the real value, encrypt this file with:
    #   sops -e -i cluster/core/network-system/dns/external-dns-cloudflare/secret.sops.yaml
    api-token: REPLACE_ME

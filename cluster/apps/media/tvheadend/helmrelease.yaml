---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tvheadend
  namespace: media
spec:
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: tvheadend
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
      version: 5.0.1 
  install: {}
  interval: 1m0s
  values:
    podAnnotations:
      backup.velero.io/backup-volumes: config
    persistence:
      config:
        enabled: true
        storageClass: longhorn
        size: 2Gi
        accessMode: ReadWriteOnce
      recordings:
        enabled: true
        type: custom
        volumeSpec:
          nfs:
            server: nas.home
            path: /mnt/tank/k8s/nfs/pvc-d1aa46aa-5848-4ea3-a727-0cfbd980xxxx # TODO: verify full UUID suffix from NAS/kubectl get pv
      timeshift:
        enabled: true
        type: custom
        volumeSpec:
          nfs:
            server: nas.home
            path: /mnt/tank/k8s/nfs/pvc-0947b321-7c64-4f62-9de8-82a1b172xxxx # TODO: verify full UUID suffix from NAS/kubectl get pv
    service:
      main:
        ports:
          htsp:
            enabled: true
        annotations:
          external-dns.alpha.kubernetes.io/hostname: tvh.${BASE_DOMAIN}
        type: LoadBalancer
        externalTrafficPolicy: Local

    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: ca-issuer
          hajimari.io/enable: 'true'
          hajimari.io/icon: 'home-automation'
          hajimari.io/appName: 'TV Head end'
        tls:
          - hosts:
            - tvheadend.${BASE_DOMAIN}
            secretName: tvheadend-tls
        hosts:
          - host: tvheadend.${BASE_DOMAIN}
            paths:
              - path: /
    env:
      TZ: Australia/Sydney
    image:
      repository: ghcr.io/linuxserver/tvheadend
      tag: version-653bd040

    # to access tv tuner
    nodeSelector:
      feature.node.kubernetes.io/custom-dvb_usb_dib0700: 'true'

    securityContext:
      privileged: true

    #podAnnotations:
    #  k8s.v1.cni.cncf.io/networks: |
    #    [{
    #      "name":"macvlan-home-static",
    #      "namespace": "system",
    #      "ips": ["192.168.58.201/24"]
    #    }]

    resources:
      requests:
        cpu: "0.3"
        memory: "256Mi"
      limits:
        memory: "512Mi"

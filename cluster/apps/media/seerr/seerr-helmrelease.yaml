---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: seerr
  namespace: media
spec:
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      version: 3.5.1
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  interval: 10m0s
  values:
    defaultPodOptions:
      nodeSelector:
        storage: longhorn
    controllers:
      seerr:
        containers:
          app:
            env:
              TZ: Australia/Sydney
            image:
              repository: ghcr.io/seerr-team/seerr
              tag: "v3.1.0"
    service:
      app:
        controller: seerr
        ports:
          http:
            port: 5055
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: ca-issuer
          traefik.ingress.kubernetes.io/router.middlewares: network-system-https-redirectscheme@kubernetescrd
        hosts:
          - host: seerr.${BASE_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: 5055
        tls:
          - secretName: tls.seerr
            hosts:
              - seerr.${BASE_DOMAIN}
    persistence:
      config:
        enabled: true
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /app/config

apiVersion: gemini.fairwinds.com/v1beta1
kind: SnapshotGroup
metadata:
  name: node-red-data
  namespace: home-automation
spec:
  persistentVolumeClaim:
    claimName: node-red-data-longhorn
  schedule:
    - every: "10 minutes"
      keep: 3
  template:
    spec:
      volumeSnapshotClassName: longhorn

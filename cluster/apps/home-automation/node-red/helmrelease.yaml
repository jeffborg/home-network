---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: node-red
  namespace: home-automation
spec:
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: node-red
      version: 10.3.2
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home
        namespace: flux-system
  install:
    timeout: 5m
  interval: 10m0s
  values:
    podAnnotations:
      backup.velero.io/backup-volumes: data
    image:
      repository: nodered/node-red
      tag: 3.1.15
    env:
      TZ: Australia/Sydney
    nodeSelector:
      storage: longhorn
    # Init container copies existing data from the old NFS-backed PVC into the new
    # Longhorn volume on first boot (skipped when the destination is non-empty).
    initContainers:
      - name: data-migration
        image: busybox:1.36.1
        command:
          - /bin/sh
          - -c
          - |
            if [ ! -d /new-data ] || [ -z "$(ls -A /new-data)" ]; then
              echo "Migrating data from old storage to Longhorn..."
              cp -a /old-data/. /new-data/
              echo "Migration complete."
            else
              echo "Longhorn volume already has data, skipping migration."
            fi
        volumeMounts:
          - name: data
            mountPath: /new-data
          - name: old-nfs-data
            mountPath: /old-data
            readOnly: true
    # Expose the pre-migration NFS PVC as an extra volume for the init container.
    # It is not auto-mounted in the main container.
    additionalVolumes:
      - name: old-nfs-data
        persistentVolumeClaim:
          claimName: node-red-data
    persistence:
      data:
        enabled: true
        existingClaim: node-red-data-longhorn
        accessMode: ReadWriteOnce
        size: 1Gi
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: ca-issuer
          traefik.ingress.kubernetes.io/router.middlewares: network-system-https-redirectscheme@kubernetescrd          
          hajimari.io/enable: 'true'
          hajimari.io/icon: 'home-automation'
          hajimari.io/appName: 'node-red'
        tls:
          - hosts:
            - node-red.${BASE_DOMAIN}
            secretName: node-red-tls
        hosts:
          - host: node-red.${BASE_DOMAIN}
            paths:
              - path: /

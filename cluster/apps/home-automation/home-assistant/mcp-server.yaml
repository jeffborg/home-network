---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: home-assistant-mcp
  namespace: home-automation
  labels:
    app: home-assistant-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: home-assistant-mcp
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: home-assistant-mcp
    spec:
      containers:
        - name: home-assistant-mcp
          image: ghcr.io/homeassistant-ai/ha-mcp:7.13.0
          imagePullPolicy: IfNotPresent
          command:
            - fastmcp
            - run
            - fastmcp-http.json
          env:
            - name: TZ
              value: Australia/Sydney
            - name: HOMEASSISTANT_URL
              value: http://home-assistant:8123
            - name: HOMEASSISTANT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: appdaemon
                  key: TOKEN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: home-assistant-mcp
  namespace: home-automation
spec:
  selector:
    app: home-assistant-mcp
  ports:
    - name: http
      protocol: TCP
      port: 8086
      targetPort: 8086
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant-mcp
  namespace: home-automation
  annotations:
    cert-manager.io/cluster-issuer: ca-issuer
    traefik.ingress.kubernetes.io/router.middlewares: network-system-https-redirectscheme@kubernetescrd
spec:
  tls:
    - hosts:
        - mcp.homeassistant.${BASE_DOMAIN}
      secretName: homeassistant-mcp-tls
  rules:
    - host: mcp.homeassistant.${BASE_DOMAIN}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: home-assistant-mcp
                port:
                  number: 8086

---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: emhass
  namespace: home-automation
spec:
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      version: 3.7.3
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 5m
  interval: 10m0s
  values:
    defaultPodOptions:
      nodeSelector:
        storage: longhorn
    controllers:
      emhass:
        strategy: Recreate
        containers:
          app:
            image:
              repository: ghcr.io/davidusb-geek/emhass
              tag: "0.17.1"
              pullPolicy: IfNotPresent
            env:
              TZ: "Australia/Sydney"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
    service:
      app:
        controller: emhass
        ports:
          http:
            port: 5000
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: ca-issuer
          hajimari.io/enable: 'true'
          hajimari.io/icon: 'solar-power'
          hajimari.io/appName: 'EMHASS'
          traefik.ingress.kubernetes.io/router.middlewares: network-system-https-redirectscheme@kubernetescrd
        hosts:
          - host: emhass.${BASE_DOMAIN}
            paths:
              - path: /
                service:
                  identifier: app
                  port: 5000
        tls:
          - secretName: emhass-tls
            hosts:
              - emhass.${BASE_DOMAIN}
    persistence:
      data:
        enabled: true
        storageClass: longhorn
        size: 1Gi
        accessMode: ReadWriteOnce
        globalMounts:
          - path: /app/data
      secrets:
        type: secret
        name: emhass
        globalMounts:
          - path: /app/secrets_emhass.yaml
            subPath: secrets_emhass.yaml
            readOnly: true

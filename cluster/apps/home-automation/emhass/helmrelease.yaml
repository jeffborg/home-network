---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: emhass
  namespace: home-automation
spec:
  chart:
    spec:
      # renovate: registryUrl=https://bjw-s-labs.github.io/helm-charts
      chart: app-template
      version: 0.2.2
      sourceRef:
        kind: HelmRepository
        name: bjw-s
        namespace: flux-system
  install:
    timeout: 5m
  interval: 10m0s
  values:
    image:
      repository: ghcr.io/davidusb-geek/emhass
      tag: "0.17.1"
      pullPolicy: IfNotPresent
    strategy:
      type: Recreate
    env:
      TZ: "Australia/Sydney"
    service:
      main:
        ports:
          http:
            port: 5000
    ingress:
      main:
        enabled: true
        annotations:
          cert-manager.io/cluster-issuer: ca-issuer
          hajimari.io/enable: 'true'
          hajimari.io/icon: 'solar-power'
          hajimari.io/appName: 'EMHASS'
          traefik.ingress.kubernetes.io/router.middlewares: network-system-https-redirectscheme@kubernetescrd
        tls:
          - hosts:
            - emhass.${BASE_DOMAIN}
            secretName: emhass-tls
        hosts:
          - host: emhass.${BASE_DOMAIN}
            paths:
              - path: /
                pathType: Prefix
    nodeSelector:
      storage: longhorn
    persistence:
      data:
        enabled: true
        storageClass: longhorn
        size: 1Gi
        mountPath: /app/data
      secrets:
        enabled: true
        type: secret
        name: emhass
        mountPath: /app/secrets_emhass.yaml
        subPath: secrets_emhass.yaml
        readOnly: true

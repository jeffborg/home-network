---
# GitHub Copilot Bridge - runs the GitHub Copilot CLI in headless server mode
# so the Home Assistant GitHub Copilot integration can connect to it.
# See: https://github.com/tserra30/Github-Copilot-SDK-integration
#
# The main container runs a prebuilt GitHub Copilot Bridge image from GHCR,
# with the Copilot CLI baked in and proxied to port 8000.
#
# In Home Assistant, configure the integration with:
#   Copilot CLI URL: http://github-copilot-bridge.home-automation.svc.cluster.local:8000
apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-copilot-bridge
  namespace: home-automation
  labels:
    app: github-copilot-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-copilot-bridge
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: github-copilot-bridge
    spec:
      containers:
        - name: github-copilot-bridge
          image: ghcr.io/jeffborg/home-network-github-copilot-bridge:v1.0.37
          imagePullPolicy: Always
          env:
            - name: COPILOT_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-copilot-bridge
                  key: github_token
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi

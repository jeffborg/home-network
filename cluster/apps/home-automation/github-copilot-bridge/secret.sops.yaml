# This file must be encrypted with SOPS before committing to the repository.
# Replace the placeholder token below with your real GitHub personal access token,
# then run:  sops -e -i secret.sops.yaml
#
# The token must belong to a GitHub account with an active Copilot subscription.
# See: https://github.com/settings/tokens
apiVersion: v1
kind: Secret
metadata:
    name: github-copilot-bridge
    namespace: home-automation
stringData:
    github_token: "REPLACE_WITH_YOUR_GITHUB_PAT_TOKEN"
